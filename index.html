<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Reel — 画像&プロンプト共有</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #121212;
    --surface: #1c1c1e;
    --surface-2: #262629;
    --ink: #e6e6e6;
    --ink-dim: #9a9a9a;
    --accent: #0096fa;
    --accent-dim: #16344a;
    --line: #2e2e31;
    --danger: #ff4060;
    --danger-dim: #3a1c25;
    --like: #ff4060;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 80px;
  }
  .wrap{ max-width: 980px; margin: 0 auto; }

  header{ margin-bottom: 24px; }
  header .eyebrow{
    font-size: 12px;
    letter-spacing: 0.02em;
    color: var(--ink-dim);
  }
  header h1{
    font-size: 26px;
    font-weight: 700;
    margin: 4px 0 4px;
    letter-spacing: 0;
  }
  header p{ color: var(--ink-dim); margin: 0; font-size: 14px; }

  /* ---- タブ ---- */
  .tabs{
    display:flex; gap: 8px;
    margin: 26px 0 24px;
  }
  .tab-btn{
    font-size: 15px;
    background: var(--surface);
    color: var(--ink-dim);
    border: 1px solid var(--line);
    padding: 9px 22px;
    border-radius: 8px;
    cursor: pointer;
  }
  .tab-btn:hover{ color: var(--ink); }
  .tab-btn.active{ background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  /* ---- 投稿フォーム ---- */
  .panel{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .panel h2{
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 16px;
    display:flex; align-items:center; gap:10px;
  }
  .panel h2::before{
    content:'';
    width:4px; height:16px;
    background: var(--accent);
    border-radius: 2px;
    display:inline-block;
  }

  label.field-label{
    display:block;
    font-size: 12px;
    color: var(--ink-dim);
    margin: 18px 0 6px;
    letter-spacing: 0;
  }
  label.field-label:first-of-type{ margin-top: 0; }

  /* ドロップゾーン */
  .dropzone{
    width:100%;
    background: var(--surface-2);
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    padding: 22px;
    color: var(--ink-dim);
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .dropzone.drag-over{ border-color: var(--accent); background: rgba(232,163,61,0.08); color: var(--accent); }
  .dropzone input{ display:none; }
  .dropzone .preview{
    margin-top: 14px; display:flex; justify-content:center;
  }
  .dropzone .preview img{
    max-height: 160px; border-radius: 8px; border: 1px solid var(--line);
  }

  input[type="text"], input[type="number"]{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px;
  }
  textarea{
    width:100%;
    min-height: 90px;
    resize: vertical;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  textarea:focus, input:focus, select:focus{
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* 設定グリッド */
  .settings-toggle{
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--accent);
    background: none; border: 1px solid var(--accent-dim);
    border-radius: 8px; padding: 8px 14px; margin-top: 18px; cursor: pointer;
  }
  .settings-grid{
    display:none;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-top: 14px;
    padding: 16px;
    background: var(--surface-2);
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .settings-grid.open{ display:grid; }
  .settings-grid .field label{
    display:block; font-size: 11px; color: var(--ink-dim);
    font-family: 'Noto Sans JP', sans-serif; margin-bottom: 5px;
  }
  .settings-grid .field input{ font-family: 'Noto Sans JP', sans-serif; font-size: 13px; }

  .tag-row{ display:flex; gap:8px; flex-wrap: wrap; }
  select{
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--ink);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  select{ flex: 1 1 160px; }
  .tag-row input[type="text"]{ flex: 1 1 160px; width:auto; }

  button{
    font-size: 13px;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    cursor: pointer;
    transition: opacity .15s ease, background .12s ease, border-color .12s ease;
  }
  .btn-ghost{
    background: var(--surface-2);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover{ border-color: var(--accent); color: var(--accent); }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 12px; min-height: 20px; }
  .chip{
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 999px;
    padding: 5px 10px 5px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    display:flex; align-items:center; gap:6px;
  }
  .chip button{
    background:none; border:none; color: var(--accent);
    padding:0; font-size:14px; line-height:1; cursor:pointer;
  }

  .submit-row{ margin-top: 22px; display:flex; align-items:center; gap:14px; }
  .btn-submit{
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    padding: 11px 22px;
  }
  .btn-submit:hover{ opacity: 0.9; }
  .btn-submit:disabled{ opacity: 0.5; cursor: default; }
  .status{ font-size: 12px; color: var(--ink-dim); font-family: 'Noto Sans JP', sans-serif; }

  /* ---- 閲覧タブ:検索バー ---- */
  .search-panel{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 20px;
  }
  .search-row{ display:flex; align-items:center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-row:last-child{ margin-bottom: 0; }
  .search-row .label{
    font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--ink-dim);
    min-width: 90px;
  }
  .mode-toggle{ display:flex; border: 1px solid var(--line); border-radius: 8px; overflow:hidden; }
  .mode-toggle button{
    background: var(--surface-2); color: var(--ink-dim); border-radius:0; padding: 6px 12px;
  }
  .mode-toggle button.active{ background: var(--accent); color: #fff; }

  .tag-cloud{ display:flex; flex-wrap: wrap; gap: 8px; }
  .tag-pill{
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-dim);
    cursor: pointer;
    user-select: none;
  }
  .tag-pill.state-include{ background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .tag-pill.state-exclude{ background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }
  .clear-tags{ font-family:'Noto Sans JP', sans-serif; font-size: 11px; color: var(--ink-dim); background:none; border:none; text-decoration: underline; cursor: pointer; padding: 4px; }

  #postTagCloud{ overflow: hidden; }
  .show-all-tags{
    margin-top: 8px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
    background: var(--surface-2); color: var(--accent);
    border: 1px solid var(--accent-dim); border-radius: 8px;
    padding: 7px 14px; cursor: pointer;
  }
  .show-all-tags:hover{ border-color: var(--accent); }
  .tag-modal-hint{ font-size: 12px; color: var(--ink-dim); font-family:'Noto Sans JP',sans-serif; margin: 0 0 14px; }

  .toolbar{
    display:flex; justify-content: space-between; align-items:center;
    margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
  }
  .count{ color: var(--ink-dim); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; }

  /* ---- 一覧(1投稿1行) ---- */
  .list{ display:flex; flex-direction: column; gap: 8px; }
  .row{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: background .12s ease;
  }
  .row:hover{ background: var(--surface-2); }
  .row-main{
    display:flex; align-items:center; gap: 16px;
    padding: 12px 16px;
  }
  .row-thumb{
    width: 104px; height: 104px; border-radius: 8px; overflow:hidden;
    flex-shrink: 0; background: var(--surface-2);
  }
  .row-thumb img{ width:100%; height:100%; object-fit: cover; display:block; }
  .row-thumb{ position: relative; }
  img.img-failed{ opacity: 0.25; }
  .row-body{ flex:1; min-width:0; display:flex; flex-direction: column; gap: 7px; }
  .row-title{
    font-size: 15px; font-weight: 700; white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
  }
  .row-meta{
    font-size: 12px; color: var(--ink-dim);
    display:flex; gap: 14px; flex-wrap: wrap; align-items:center;
  }
  .row-tags{ display:flex; gap:6px; flex-wrap:wrap; }
  .row-tags .tag{
    font-size: 11.5px;
    background: transparent; color: var(--accent);
    padding: 2px 8px; border-radius: 4px; border: 1px solid var(--line);
  }
  .row-tags .tag::before{ content:'#'; opacity: 0.6; margin-right: 1px; }
  .detail-grid{ display:flex; gap: 22px; flex-wrap: wrap; }
  .detail-image{ flex: 0 0 260px; }
  .detail-image img{ width:100%; border-radius: 10px; border: 1px solid var(--line); display:block; }
  .detail-text{ flex: 1 1 320px; min-width: 260px; }
  .detail-block{ margin-bottom: 16px; }
  .detail-block .label{
    font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--ink-dim);
    margin-bottom: 5px; letter-spacing: 0.05em;
  }
  .detail-block .value{
    font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    background: var(--surface-2); border-radius: 8px; padding: 10px 12px; border: 1px solid var(--line);
  }
  .settings-table{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
    gap: 8px 16px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
  }
  .settings-table div span{ color: var(--ink-dim); display:block; font-size:10.5px; }

  .empty{
    text-align:center; color: var(--ink-dim);
    padding: 60px 20px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  }

  /* ---- 詳細モーダル ---- */
  .modal-overlay{
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,11,24,0.78);
    display:none; align-items: flex-start; justify-content: center;
    padding: 40px 16px; overflow-y: auto;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    max-width: 860px; width: 100%;
    padding: 22px 24px 26px;
    position: relative;
  }
  .modal-close{
    position: absolute; top: 14px; right: 14px;
    background: var(--surface-2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; padding: 6px 12px;
  }
  .modal-title{ font-family:'Noto Sans JP',sans-serif; font-weight:700; font-size: 20px; margin: 0 90px 6px 0; word-break: break-word; }
  .modal-meta{
    font-family:'Noto Sans JP',sans-serif; font-size: 12px; color: var(--ink-dim);
    display:flex; gap: 14px; flex-wrap:wrap; margin-bottom: 12px;
  }
  .modal .row-tags{ max-width: none; margin-bottom: 16px; }
  .modal-image{ text-align:center; }
  .modal-image img{ max-width: 100%; max-height: 70vh; border-radius: 10px; border: 1px solid var(--line); }
  .modal-actions{ display:flex; gap: 10px; justify-content:center; margin: 12px 0 20px; }
  .block-head{ display:flex; align-items:center; justify-content: space-between; gap: 10px; margin-bottom: 5px; }
  .block-head .label{ margin-bottom: 0; }
  .btn-copy{
    background: var(--surface-2); color: var(--accent);
    border: 1px solid var(--accent-dim); padding: 4px 12px; font-size: 11px;
  }
  .btn-copy:hover{ border-color: var(--accent); }

  /* ---- 読み込みオーバーレイ ---- */
  .loading-overlay{
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,11,24,0.65);
    display:none; align-items:center; justify-content:center; flex-direction: column; gap: 14px;
    font-family:'Noto Sans JP',sans-serif; font-size: 13px; color: var(--ink);
  }
  .loading-overlay.open{ display:flex; }
  .spinner{
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  textarea.autogrow{ resize: none; overflow: hidden; }
  .filter-input{ flex: 1 1 150px; width: auto; }

  /* ---- ソートチップ ---- */
  .sort-chips{ display:flex; flex-wrap:wrap; gap: 8px; }
  .sort-chip{
    font-family:'Noto Sans JP',sans-serif; font-size: 12px;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink-dim);
    cursor: pointer; user-select: none; display:inline-flex; align-items:center; gap: 6px;
  }
  .sort-chip.active{ background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .sort-chip .order-badge{
    font-size: 10px; background: var(--accent); color: #fff;
    border-radius: 999px; min-width: 15px; height: 15px; padding: 0 4px;
    display:inline-flex; align-items:center; justify-content:center;
  }

  /* ---- カウント表示 ---- */
  .count-badges{ display:flex; gap: 10px; align-items:center; }
  .count-badge{
    font-size: 13px; color: var(--ink-dim);
    display:inline-flex; align-items:center; gap: 5px;
  }
  .like-btn{
    background: var(--surface-2); border: 1px solid var(--line);
    padding: 5px 12px 5px 10px; border-radius: 999px; cursor: pointer;
    font-size: 13px; color: var(--ink-dim);
    display:inline-flex; align-items:center; gap: 6px;
    transition: color .12s ease, border-color .12s ease, background .12s ease;
  }
  .like-btn:hover{ color: var(--like); border-color: var(--like); }
  .like-btn .heart{ font-size: 17px; line-height: 1; }
  .like-btn.liked{ color: var(--like); border-color: var(--like); background: var(--danger-dim); }
  .row-meta .count-badges{ margin-top: 0; }
  .modal-counts{ margin-bottom: 14px; }
  .modal-counts .like-btn{ padding: 8px 16px 8px 13px; font-size: 15px; }
  .modal-counts .like-btn .heart{ font-size: 20px; }
  .modal-counts .count-badge{ font-size: 15px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">仲間内で使う画像＆プロンプト共有ボード</div>
    <h1>Prompt Reel</h1>
    <p>画像とStable Diffusionの生成設定をまとめて記録・共有できます。</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="post">投稿</button>
    <button class="tab-btn" data-tab="browse">投稿一覧</button>
  </nav>

  <!-- ============ 投稿タブ ============ -->
  <div class="tab-panel active" id="tab-post">
    <section class="panel">
      <h2>新規投稿</h2>

      <label class="field-label">画像</label>
      <div class="dropzone" id="dropzone">
        <span id="dropzoneLabel">ここに画像をドラッグ&ドロップ、またはクリックして選択</span>
        <div class="preview" id="previewWrap" style="display:none;"><img id="previewImg" alt="プレビュー"></div>
        <input type="file" id="imageInput">
      </div>

      <label class="field-label">投稿タイトル</label>
      <input type="text" id="titleInput" placeholder="例: 桜並木の少女">

      <label class="field-label">投稿者(空欄で匿名)</label>
      <input type="text" id="authorInput" list="dl_author" placeholder="匿名">

      <label class="field-label">プロンプト</label>
      <textarea id="promptInput" class="autogrow" placeholder="Positive prompt"></textarea>

      <label class="field-label">ネガティブプロンプト</label>
      <textarea id="negativeInput" class="autogrow" placeholder="Negative prompt"></textarea>

      <label class="field-label">メモ(備考)</label>
      <textarea id="memoInput" class="autogrow" placeholder="補足・備考があれば"></textarea>

      <label class="field-label">生成設定(任意 / 画像ドロップで自動入力)</label>
      <div class="settings-grid open" id="settingsGrid"></div>

      <label class="field-label">タグ(クリックで選択 / もう一度クリックで解除)</label>
      <div class="tag-cloud" id="postTagCloud"></div>
      <button class="show-all-tags" type="button" id="showAllTagsBtn" style="display:none;">全て表示</button>
      <div class="tag-row" style="margin-top:10px;">
        <input type="text" id="newTagInput" placeholder="新しいタグを入力して追加">
        <button class="btn-ghost" id="addNewTagBtn" type="button">追加</button>
      </div>
      <div class="chips" id="selectedTags"></div>

      <div class="submit-row">
        <button class="btn-submit" id="submitBtn" type="button">投稿する</button>
        <span class="status" id="statusText"></span>
      </div>
    </section>
  </div>

  <!-- ============ 閲覧タブ ============ -->
  <div class="tab-panel" id="tab-browse">

    <div class="search-panel">
      <div class="search-row">
        <span class="label">並び順</span>
        <div class="sort-chips" id="sortChips"></div>
      </div>
      <div class="search-row">
        <span class="label" style="margin-left:0;">含むタグの条件</span>
        <div class="mode-toggle">
          <button type="button" data-mode="AND" class="active">AND</button>
          <button type="button" data-mode="OR">OR</button>
        </div>
        <button class="clear-tags" id="clearTagsBtn" type="button">タグ選択をクリア</button>
      </div>
      <div class="search-row">
        <span class="label">絞り込み</span>
        <input type="text" class="filter-input" id="filterAuthor" list="dl_author" placeholder="投稿者">
        <input type="text" class="filter-input" id="filterUiPreset" list="dl_set_uiPreset" placeholder="UI Preset">
        <input type="text" class="filter-input" id="filterCheckpoint" list="dl_set_checkpoint" placeholder="Checkpoint">
        <button class="clear-tags" id="clearFiltersBtn" type="button">絞り込みをクリア</button>
      </div>
      <div class="search-row">
        <span class="label">タグで絞込</span>
      </div>
      <div class="tag-cloud" id="tagCloud"></div>
      <div style="margin-top:8px; font-size:11px; color:var(--ink-dim); font-family:'Noto Sans JP',sans-serif;">
        クリックで切替: 未選択 → 含む(AND/OR) → 除外(NOT) → 未選択
      </div>
    </div>

    <div class="toolbar">
      <span class="count" id="postCount"></span>
    </div>

    <div class="list" id="list"></div>
    <div class="empty" id="emptyState" style="display:none;">条件に一致する投稿がありません。</div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>

<div class="modal-overlay" id="tagModalOverlay">
  <div class="modal">
    <button class="modal-close" type="button" id="tagModalCloseBtn">✕ 閉じる</button>
    <h3 class="modal-title" style="margin-right:90px;">タグを選択</h3>
    <p class="tag-modal-hint">クリックで選択 / もう一度クリックで解除</p>
    <div class="tag-cloud" id="tagModalCloud"></div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingText">読み込み中...</span>
</div>

<datalist id="dl_author"></datalist>

<script>
  // ▼▼▼ ここをデプロイしたウェブアプリのURLに書き換えてください ▼▼▼
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxNsk0jrPHQLQE9akiT5OiM7iKG-VohCAUPErea_dd3JFLjBj4xBXi_lKkVRaEFyQQn/exec';
  // ▲▲▲ ───────────────────────────────────── ▲▲▲

  // Stable Diffusion 設定項目の定義 (フォーム生成・詳細表示の両方で使用)
  const SETTINGS_FIELDS = [
    { key: 'uiPreset',          label: 'UI Preset',           type: 'text' },
    { key: 'checkpoint',        label: 'Checkpoint',          type: 'text' },
    { key: 'modelHash',         label: 'Model hash',          type: 'text' },

  /* ---------- 画像メタデータ(生成情報)読み取り ---------- */
  function extractPngParameters(buffer) {
    const bytes = new Uint8Array(buffer);
    const sig = [137, 80, 78, 71, 13, 10, 26, 10];
    for (let i = 0; i < 8; i++) { if (bytes[i] !== sig[i]) return null; }
    const utf8 = new TextDecoder('utf-8');
    const latin = new TextDecoder('latin1');
    let off = 8;
    while (off + 8 <= bytes.length) {
      const len = (bytes[off] * 16777216) + (bytes[off + 1] * 65536) + (bytes[off + 2] * 256) + bytes[off + 3];
      const type = latin.decode(bytes.subarray(off + 4, off + 8));
      const dataStart = off + 8;
      const dataEnd = dataStart + len;
      if (len < 0 || dataEnd > bytes.length) break;
      const chunk = bytes.subarray(dataStart, dataEnd);
      if (type === 'tEXt') {
        const nul = chunk.indexOf(0);
        if (nul !== -1 && latin.decode(chunk.subarray(0, nul)) === 'parameters') {
          return utf8.decode(chunk.subarray(nul + 1));
        }
      } else if (type === 'iTXt') {
        const nul = chunk.indexOf(0);
        if (nul !== -1 && latin.decode(chunk.subarray(0, nul)) === 'parameters') {
          const compFlag = chunk[nul + 1];
          const z1 = chunk.indexOf(0, nul + 3);
          if (z1 === -1) return null;
          const z2 = chunk.indexOf(0, z1 + 1);
          if (z2 === -1) return null;
          if (compFlag === 0) return utf8.decode(chunk.subarray(z2 + 1));
          return null;
        }
      }
      if (type === 'IEND') break;
      off = dataEnd + 4;
    }
    return null;
  }

  function decodeUnicodeUserComment(body) {
    function score(s) { let c = 0; const n = Math.min(s.length, 40); for (let i = 0; i < n; i++) { const cc = s.charCodeAt(i); if (cc >= 0x20 && cc < 0x7f) c++; } return c; }
    let be = '', le = '';
    try { be = new TextDecoder('utf-16be').decode(body); } catch (e) {}
    try { le = new TextDecoder('utf-16le').decode(body); } catch (e) {}
    return (score(be) >= score(le) ? be : le).replace(/\u0000+$/, '');
  }

  function decodeUserComment(bytes) {
    if (bytes.length < 8) return new TextDecoder('utf-8').decode(bytes).replace(/\u0000+$/, '') || null;
    const prefix = new TextDecoder('latin1').decode(bytes.subarray(0, 8));
    const body = bytes.subarray(8);
    if (prefix.indexOf('UNICODE') === 0) return decodeUnicodeUserComment(body);
    if (prefix.indexOf('ASCII') === 0) return new TextDecoder('utf-8').decode(body).replace(/\u0000+$/, '');
    const bodyStr = new TextDecoder('utf-8').decode(body).replace(/\u0000+$/, '');
    const allStr = new TextDecoder('utf-8').decode(bytes).replace(/\u0000+$/, '');
    return bodyStr || allStr || null;
  }

  function extractExifUserComment(buffer) {
    const bytes = new Uint8Array(buffer);
    const latin = new TextDecoder('latin1');
    let tiffStart = -1;
    if (bytes[0] === 0xFF && bytes[1] === 0xD8) {
      let off = 2;
      while (off + 4 <= bytes.length) {
        if (bytes[off] !== 0xFF) { off++; continue; }
        let marker = bytes[off + 1];
        while (marker === 0xFF && off + 2 < bytes.length) { off++; marker = bytes[off + 1]; }
        if (marker === 0xD8 || marker === 0xD9 || (marker >= 0xD0 && marker <= 0xD7) || marker === 0x01) { off += 2; continue; }
        if (marker === 0xDA) break;
        const segLen = (bytes[off + 2] << 8) | bytes[off + 3];
        if (segLen < 2) break;
        if (marker === 0xE1) {
          const p = off + 4;
          if (p + 6 <= bytes.length && bytes[p] === 0x45 && bytes[p + 1] === 0x78 && bytes[p + 2] === 0x69 && bytes[p + 3] === 0x66 && bytes[p + 4] === 0 && bytes[p + 5] === 0) {
            tiffStart = p + 6; break;
          }
        }
        off += 2 + segLen;
      }
    } else if (bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[3] === 0x46 && bytes[8] === 0x57 && bytes[9] === 0x45 && bytes[10] === 0x42 && bytes[11] === 0x50) {
      let off = 12;
      while (off + 8 <= bytes.length) {
        const cc = latin.decode(bytes.subarray(off, off + 4));
        const size = bytes[off + 4] + bytes[off + 5] * 256 + bytes[off + 6] * 65536 + bytes[off + 7] * 16777216;
        const dataStart = off + 8;
        if (cc === 'EXIF') {
          let ts = dataStart;
          if (ts + 6 <= bytes.length && bytes[ts] === 0x45 && bytes[ts + 1] === 0x78 && bytes[ts + 2] === 0x69 && bytes[ts + 3] === 0x66 && bytes[ts + 4] === 0 && bytes[ts + 5] === 0) ts += 6;
          tiffStart = ts; break;
        }
        off = dataStart + size + (size % 2);
      }
    }
    if (tiffStart < 0 || tiffStart + 8 > bytes.length) return null;
    const le = bytes[tiffStart] === 0x49 && bytes[tiffStart + 1] === 0x49;
    const be = bytes[tiffStart] === 0x4D && bytes[tiffStart + 1] === 0x4D;
    if (!le && !be) return null;
    function u16(o) { return le ? (bytes[o] | (bytes[o + 1] << 8)) : ((bytes[o] << 8) | bytes[o + 1]); }
    function u32(o) { return le ? (bytes[o] + bytes[o + 1] * 256 + bytes[o + 2] * 65536 + bytes[o + 3] * 16777216) : (bytes[o] * 16777216 + bytes[o + 1] * 65536 + bytes[o + 2] * 256 + bytes[o + 3]); }
    const TYPE_SIZE = { 1: 1, 2: 1, 3: 2, 4: 4, 5: 8, 7: 1, 9: 4, 10: 8 };
    function findTag(ifdOff, tag) {
      if (ifdOff + 2 > bytes.length) return null;
      const n = u16(ifdOff);
      for (let i = 0; i < n; i++) { const e = ifdOff + 2 + i * 12; if (e + 12 > bytes.length) break; if (u16(e) === tag) return { type: u16(e + 2), count: u32(e + 4), valOff: e + 8 }; }
      return null;
    }
    function entryBytes(entry) {
      const size = (TYPE_SIZE[entry.type] || 1) * entry.count;
      const dataOff = size <= 4 ? entry.valOff : tiffStart + u32(entry.valOff);
      if (dataOff + size > bytes.length) return null;
      return bytes.subarray(dataOff, dataOff + size);
    }
    const ifd0 = tiffStart + u32(tiffStart + 4);
    const exifPtr = findTag(ifd0, 0x8769);
    if (exifPtr) {
      const exifIfd = tiffStart + u32(exifPtr.valOff);
      const uc = findTag(exifIfd, 0x9286);
      if (uc) { const b = entryBytes(uc); if (b) { const s = decodeUserComment(b); if (s) return s; } }
    }
    const desc = findTag(ifd0, 0x010E);
    if (desc && desc.type === 2) { const b = entryBytes(desc); if (b) { const s = new TextDecoder('utf-8').decode(b).replace(/\u0000+$/, ''); if (s) return s; } }
    return null;
  }

  function extractImageParameters(buffer) {

  function parseGenerationInfo(text) {
    const lines = text.replace(/\r/g, '').split('\n');
    const RE = /([\w ]+):\s*("(?:\\.|[^"\\])*"|[^,]*)\s*(?:,|$)/g;
    function countParams(line) { let c = 0; RE.lastIndex = 0; while (RE.exec(line)) c++; return c; }
    let lastLine = lines.length ? lines[lines.length - 1].trim() : '';
    let bodyLines;
    if (countParams(lastLine) >= 3) { bodyLines = lines.slice(0, -1); }
    else { bodyLines = lines.slice(); lastLine = ''; }

    let prompt = '', negative = '', doneWithPrompt = false;
    bodyLines.forEach(function (raw) {
      let line = raw.trim();
      if (line.indexOf('Negative prompt:') === 0) {
        doneWithPrompt = true;
        line = line.slice('Negative prompt:'.length).trim();
      }
      if (doneWithPrompt) negative += (negative ? '\n' : '') + line;
      else prompt += (prompt ? '\n' : '') + line;
    });

    const params = {};
    let m; RE.lastIndex = 0;
    while ((m = RE.exec(lastLine))) {
      let v = m[2].trim();
      if (v.length >= 2 && v[0] === '"' && v[v.length - 1] === '"') {
        try { v = JSON.parse(v); } catch (e) { v = v.slice(1, -1); }
      }
      params[m[1].trim()] = v;
    }
    return { prompt: prompt, negative: negative, params: params };
  }

  function applyGenerationInfo(info) {
    let filledAny = false;
    const promptEl = document.getElementById('promptInput');
    const negEl = document.getElementById('negativeInput');
    if (info.prompt) { promptEl.value = info.prompt; autoGrow(promptEl); filledAny = true; }

    const values = {};

    Object.keys(PARAM_KEY_MAP).forEach(function (pk) {
      consumed[pk] = true;
      if (info.params[pk] !== undefined && String(info.params[pk]) !== '') values[PARAM_KEY_MAP[pk]] = info.params[pk];

    if (info.params['Size']) {

      if (sm) { values.width = sm[1]; values.height = sm[2]; }

    Object.keys(info.params).forEach(function (k) {
      if (!consumed[k] && String(info.params[k]) !== '') {

    return filledAny;
  }

  // GAS WebアプリはクロスオリジンfetchだとCORSでブロックされることがあるため、
  // <script>タグ読み込み(JSONP)で取得する。
  function jsonpRequest(url) {
    return new Promise(function (resolve, reject) {
      const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      const script = document.createElement('script');

      const timeoutId = setTimeout(function () {
        cleanup();
        reject(new Error('タイムアウトしました'));
      }, 15000);

      function cleanup() {
        delete window[callbackName];
        script.remove();
        clearTimeout(timeoutId);
      }

      window[callbackName] = function (data) {
        cleanup();
        resolve(data);
      };

      script.onerror = function () {
        cleanup();
        reject(new Error('読み込みに失敗しました'));
      };

      script.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 'callback=' + callbackName;
      document.body.appendChild(script);
    });
  }

  function toggleSelectedTag(t) {
    const idx = selectedTags.indexOf(t);
    if (idx === -1) selectedTags.push(t); else selectedTags.splice(idx, 1);
    renderChips();
  }

  function rebuildPostTagCloud() {
    const tags = allUniqueTags();
    postTagCloud.innerHTML = tags.map(function (t) {
      const cls = selectedTags.includes(t) ? ' state-include' : '';
      return '<span class="tag-pill' + cls + '" data-tag="' + escapeHtml(t) + '">' + escapeHtml(t) + '</span>';
    }).join('') || '<span style="color:var(--ink-dim); font-size:12px; font-family:inherit;">タグはまだありません</span>';

    postTagCloud.querySelectorAll('.tag-pill').forEach(function (pill) {
      pill.addEventListener('click', function () { toggleSelectedTag(pill.dataset.tag); });
    });
    applyPostTagClamp();
  }

  function applyPostTagClamp() {
    const pills = Array.from(postTagCloud.querySelectorAll('.tag-pill'));
    postTagCloud.style.maxHeight = '';
    if (pills.length === 0) { showAllTagsBtn.style.display = 'none'; return; }
    const contTop = postTagCloud.getBoundingClientRect().top;
    const rows = [];
    pills.forEach(function (p) {
      const r = p.getBoundingClientRect();
      const top = Math.round(r.top - contTop);
      let row = rows.find(function (x) { return Math.abs(x.top - top) <= 2; });
      if (!row) { row = { top: top, bottom: 0 }; rows.push(row); }
      const bottom = Math.round(r.bottom - contTop);
      if (bottom > row.bottom) row.bottom = bottom;
    });
    rows.sort(function (a, b) { return a.top - b.top; });
    if (rows.length <= POST_TAG_MAX_ROWS) { showAllTagsBtn.style.display = 'none'; return; }
    postTagCloud.style.maxHeight = rows[POST_TAG_MAX_ROWS - 1].bottom + 'px';
    showAllTagsBtn.style.display = '';
  }

  /* ---------- タグ選択モーダル ---------- */
  const tagModalOverlay = document.getElementById('tagModalOverlay');
  const tagModalCloud = document.getElementById('tagModalCloud');

  function renderTagModalCloud() {
    const tags = allUniqueTags();
    tagModalCloud.innerHTML = tags.map(function (t) {
      const cls = selectedTags.includes(t) ? ' state-include' : '';
      return '<span class="tag-pill' + cls + '" data-tag="' + escapeHtml(t) + '">' + escapeHtml(t) + '</span>';
    }).join('') || '<span style="color:var(--ink-dim); font-size:12px; font-family:inherit;">タグはまだありません</span>';

    tagModalCloud.querySelectorAll('.tag-pill').forEach(function (pill) {
      pill.addEventListener('click', function () {
        toggleSelectedTag(pill.dataset.tag);
        renderTagModalCloud();
      });
    });
  }
  function openTagModal() { renderTagModalCloud(); tagModalOverlay.classList.add('open'); }
  function closeTagModal() { tagModalOverlay.classList.remove('open'); }

  showAllTagsBtn.addEventListener('click', openTagModal);
  document.getElementById('tagModalCloseBtn').addEventListener('click', closeTagModal);
  tagModalOverlay.addEventListener('click', function (e) { if (e.target === tagModalOverlay) closeTagModal(); });

  function renderChips() {
    selectedTagsEl.innerHTML = selectedTags.map(function (t, i) {
      return '<span class="chip">' + escapeHtml(t) +
        '<button type="button" data-idx="' + i + '">×</button></span>';
    }).join('');
    selectedTagsEl.querySelectorAll('button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        selectedTags.splice(Number(btn.dataset.idx), 1);
        renderChips();
      });
    });
    rebuildPostTagCloud();
  }

  document.getElementById('addNewTagBtn').addEventListener('click', function () {
    const input = document.getElementById('newTagInput');
    const v = input.value.trim();
    if (v && !selectedTags.includes(v)) { selectedTags.push(v); renderChips(); }
    input.value = '';
  });
  document.getElementById('newTagInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('addNewTagBtn').click(); }
  });

  /* ---------- テキストエリア自動拡張 ---------- */
  function autoGrow(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.max(ta.scrollHeight, 90) + 'px';
  }
  function resetAutogrow() {
    document.querySelectorAll('textarea.autogrow').forEach(function (ta) { ta.style.height = ''; });
  }
  document.querySelectorAll('textarea.autogrow').forEach(function (ta) {
    ta.addEventListener('input', function () { autoGrow(ta); });
  });

  /* ---------- 投稿処理 ---------- */
  function fileToBase64(file) {
    return new Promise(function (resolve, reject) {
      const reader = new FileReader();
      reader.onload = function () { resolve(reader.result); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('submitBtn').addEventListener('click', async function () {
    const submitBtn = this;
    const file = imageInput.files[0];

    if (!file) { statusText.textContent = '画像を選択してください'; return; }
    if (GAS_URL.indexOf('ここに') === 0) { statusText.textContent = 'GAS_URL が未設定です(index.html を確認)'; return; }

    submitBtn.disabled = true;
    showLoading('投稿中...');
    statusText.textContent = '';

    try {
      const base64 = await fileToBase64(file);
      const payload = {
        imageBase64: base64,
        imageMime: file.type,
        imageName: file.name,
        title: document.getElementById('titleInput').value,
        author: document.getElementById('authorInput').value,
        prompt: document.getElementById('promptInput').value,
        negativePrompt: document.getElementById('negativeInput').value,
        memo: document.getElementById('memoInput').value,
        settings: collectSettings(),
        tags: selectedTags
      };

      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (!result.success) {
        throw new Error(result.error || '不明なエラー');
      }

      statusText.textContent = '投稿しました';
      imageInput.value = '';
      previewWrap.style.display = 'none';
      dropzoneLabel.textContent = 'ここに画像をドラッグ&ドロップ、またはクリックして選択';
      document.getElementById('titleInput').value = '';
      document.getElementById('authorInput').value = '';
      document.getElementById('promptInput').value = '';
      document.getElementById('negativeInput').value = '';
      document.getElementById('memoInput').value = '';
      resetAutogrow();
      clearSettingsForm();
      selectedTags = [];
      renderChips();

      await loadPosts();
      switchTab('browse');
      const posted = posts.find(function (p) { return String(p.id) === String(result.id); });
      if (posted) openModal(posted);
    } catch (err) {
      statusText.textContent = '投稿に失敗しました: ' + (err.message || err);
      console.error(err);
    } finally {
      hideLoading();
      submitBtn.disabled = false;
    }
  });

  /* ---------- 閲覧タブ:一覧描画 ---------- */
  const list = document.getElementById('list');
  const emptyState = document.getElementById('emptyState');
  const postCount = document.getElementById('postCount');

  list.addEventListener('error', handleImageError, true);

  function passesTagFilter(post) {
    const tags = post.tags || [];
    const includeTags = Object.keys(tagStates).filter(function (t) { return tagStates[t] === 'include'; });
    const excludeTags = Object.keys(tagStates).filter(function (t) { return tagStates[t] === 'exclude'; });

    if (excludeTags.some(function (t) { return tags.includes(t); })) return false;

    if (includeTags.length) {
      const pass = matchMode === 'AND'
        ? includeTags.every(function (t) { return tags.includes(t); })
        : includeTags.some(function (t) { return tags.includes(t); });
      if (!pass) return false;
    }
    return true;
  }

  function formatDateTime(ts) {
    const dt = new Date(ts);
    return dt.getFullYear() + '/' + String(dt.getMonth() + 1).padStart(2, '0') + '/' +
      String(dt.getDate()).padStart(2, '0') + ' ' + String(dt.getHours()).padStart(2, '0') + ':' +
      String(dt.getMinutes()).padStart(2, '0');
  }

  function sortValueOf(p, field) {
    if (field === 'date') return new Date(p.timestamp).getTime();
    if (field === 'likeCount') return Number(p.likeCount) || 0;
    if (field === 'downloadCount') return Number(p.downloadCount) || 0;
    if (field === 'author') return p.author || '匿名';
    return (p.settings && p.settings[field]) || '';
  }

  function compareByKeys(a, b) {
    for (let i = 0; i < sortKeys.length; i++) {
      const key = sortKeys[i];
      const va = sortValueOf(a, key.field);
      const vb = sortValueOf(b, key.field);
      let cmp;
      if (typeof va === 'number' && typeof vb === 'number') {
        cmp = va - vb;
      } else {
        if (va === '' && vb !== '') { cmp = -1; }
        else if (vb === '' && va !== '') { cmp = 1; }
        else { cmp = String(va).localeCompare(String(vb), 'ja', { numeric: true }); }
      }
      if (cmp !== 0) return key.dir === 'desc' ? -cmp : cmp;
    }
    return new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime();
  }

  function countBadgesHtml(p) {
    const liked = !!likedPosts[p.id];
    return '<span class="count-badges">' +
      '<button class="like-btn' + (liked ? ' liked' : '') + '" type="button" data-like="' + p.id + '">' +
        '<span class="heart">' + (liked ? '♥' : '♡') + '</span>' +
        '<span data-like-count="' + p.id + '">' + (Number(p.likeCount) || 0) + '</span>' +
      '</button>' +
      '<span class="count-badge">⬇ <span data-dl-count="' + p.id + '">' + (Number(p.downloadCount) || 0) + '</span></span>' +
    '</span>';
  }

  function renderList() {
    let filtered = posts.filter(passesTagFilter);

    const fAuthor = document.getElementById('filterAuthor').value.trim().toLowerCase();
    const fUiPreset = document.getElementById('filterUiPreset').value.trim().toLowerCase();
    const fCheckpoint = document.getElementById('filterCheckpoint').value.trim().toLowerCase();
    filtered = filtered.filter(function (p) {
      const author = String(p.author || '').toLowerCase();
      const uiPreset = String((p.settings && p.settings.uiPreset) || '').toLowerCase();
      const checkpoint = String((p.settings && p.settings.checkpoint) || '').toLowerCase();
      if (fAuthor && author.indexOf(fAuthor) === -1) return false;
      if (fUiPreset && uiPreset.indexOf(fUiPreset) === -1) return false;
      if (fCheckpoint && checkpoint.indexOf(fCheckpoint) === -1) return false;
      return true;
    });

    filtered.sort(compareByKeys);

    postCount.textContent = filtered.length + ' 件';
    emptyState.style.display = filtered.length ? 'none' : 'block';

    list.innerHTML = filtered.map(function (p) {
      const title = p.title ? escapeHtml(p.title) : '(無題)';
      const author = p.author ? escapeHtml(p.author) : '匿名';

      return '' +
        '<div class="row" data-id="' + p.id + '">' +
          '<div class="row-main">' +
            '<div class="row-thumb">' + imageTag(p.imageUrl, { size: 'w320', lazy: true, alt: 'サムネイル' }) + '</div>' +
            '<div class="row-body">' +
              '<div class="row-title">' + title + '</div>' +
              '<div class="row-meta"><span>' + formatDateTime(p.timestamp) + '</span><span>投稿者: ' + author + '</span></div>' +
              '<div class="row-meta">' + countBadgesHtml(p) + '</div>' +
              (p.tags && p.tags.length ? '<div class="row-tags">' + p.tags.map(function (t) { return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join('') + '</div>' : '') +
            '</div>' +
          '</div>' +
        '</div>';
    }).join('');

    list.querySelectorAll('.like-btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        toggleLike(btn.dataset.like);
      });
    });

    list.querySelectorAll('.row').forEach(function (row) {
      row.addEventListener('click', function () {
        const post = posts.find(function (p) { return String(p.id) === String(row.dataset.id); });
        if (post) openModal(post);
      });
    });
  }

  /* ---------- 詳細モーダル ---------- */
  const modalOverlay = document.getElementById('modalOverlay');
  const modalBody = document.getElementById('modalBody');

  modalBody.addEventListener('error', handleImageError, true);

  function openModal(p) {
    const knownKeys = SETTINGS_FIELDS.map(function (f) { return f.key; });
    const settingsEntries = SETTINGS_FIELDS
      .filter(function (f) { return p.settings && p.settings[f.key]; })
      .map(function (f) {
        return '<div><span>' + escapeHtml(f.label) + '</span>' + escapeHtml(p.settings[f.key]) + '</div>';
      }).join('') +
      (p.settings ? Object.keys(p.settings) : [])
        .filter(function (k) { return knownKeys.indexOf(k) === -1 && String(p.settings[k]) !== ''; })
        .map(function (k) {
          return '<div><span>' + escapeHtml(k) + '</span>' + escapeHtml(p.settings[k]) + '</div>';
        }).join('');

    modalBody.innerHTML = '' +
      '<button class="modal-close" type="button" id="modalCloseBtn">✕ 閉じる</button>' +
      '<h3 class="modal-title">' + (p.title ? escapeHtml(p.title) : '(無題)') + '</h3>' +
      '<div class="modal-meta"><span>' + formatDateTime(p.timestamp) + '</span><span>投稿者: ' + (p.author ? escapeHtml(p.author) : '匿名') + '</span></div>' +
      '<div class="modal-counts">' + countBadgesHtml(p) + '</div>' +
      '<div class="row-tags">' + (p.tags || []).map(function (t) { return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join('') + '</div>' +
      '<div class="modal-image">' + imageTag(p.imageUrl, { size: 'w1000', alt: '生成画像' }) + '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn-ghost" type="button" id="downloadBtn">オリジナルサイズでダウンロード</button>' +
        '<button class="btn-ghost" type="button" id="shareBtn">共有</button>' +
      '</div>' +
      '<div class="detail-block">' +
        '<div class="block-head"><div class="label">PROMPT</div><button class="btn-copy" type="button" data-copy="prompt">コピー</button></div>' +
        '<div class="value">' + (p.prompt ? escapeHtml(p.prompt) : '(入力なし)') + '</div>' +
      '</div>' +
      '<div class="detail-block">' +
        '<div class="block-head"><div class="label">NEGATIVE PROMPT</div><button class="btn-copy" type="button" data-copy="negativePrompt">コピー</button></div>' +
        '<div class="value">' + (p.negativePrompt ? escapeHtml(p.negativePrompt) : '(入力なし)') + '</div>' +
      '</div>' +
      (p.memo ? '<div class="detail-block"><div class="label">メモ(備考)</div><div class="value">' + escapeHtml(p.memo) + '</div></div>' : '') +
      (settingsEntries ? '<div class="detail-block"><div class="label">設定関係</div><div class="settings-table">' + settingsEntries + '</div></div>' : '');

    modalBody.querySelectorAll('.btn-copy').forEach(function (btn) {
      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(p[btn.dataset.copy] || '').then(function () {
          btn.textContent = 'コピーしました';
          setTimeout(function () { btn.textContent = 'コピー'; }, 1500);
        });
      });
    });
    modalBody.querySelector('.like-btn').addEventListener('click', function () { toggleLike(p.id); });
    document.getElementById('downloadBtn').addEventListener('click', function () { downloadImage(p); });
    document.getElementById('shareBtn').addEventListener('click', function () { sharePost(p, this); });
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

    modalOverlay.classList.add('open');
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    modalBody.innerHTML = '';
  }

  modalOverlay.addEventListener('click', function (e) {
    if (e.target === modalOverlay) closeModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { closeModal(); closeTagModal(); }
  });

  async function postAction(payload) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  function updateCountUI(id) {
    const p = posts.find(function (x) { return String(x.id) === String(id); });
    if (!p) return;
    const liked = !!likedPosts[id];
    document.querySelectorAll('[data-like-count="' + id + '"]').forEach(function (el) {
      el.textContent = Number(p.likeCount) || 0;
    });
    document.querySelectorAll('[data-dl-count="' + id + '"]').forEach(function (el) {
      el.textContent = Number(p.downloadCount) || 0;
    });
    document.querySelectorAll('.like-btn[data-like="' + id + '"], .modal-counts .like-btn').forEach(function (btn) {
      btn.classList.toggle('liked', liked);
      const heart = btn.querySelector('.heart');
      if (heart) heart.textContent = liked ? '♥' : '♡';
    });
  }

  async function toggleLike(id) {
    const p = posts.find(function (x) { return String(x.id) === String(id); });
    if (!p) return;
    const currentlyLiked = !!likedPosts[id];
    const delta = currentlyLiked ? -1 : 1;

    if (currentlyLiked) delete likedPosts[id]; else likedPosts[id] = true;
    saveLiked();
    p.likeCount = Math.max(0, (Number(p.likeCount) || 0) + delta);
    updateCountUI(id);

    try {
      const result = await postAction({ action: 'like', id: id, delta: delta });
      if (result && result.success && typeof result.likeCount === 'number') {
        p.likeCount = result.likeCount;
        updateCountUI(id);
      }
    } catch (err) {
      console.error(err);
    }
  }

  function sharePost(p, btn) {
    const code = p.shareId || p.id;
    const url = location.origin + location.pathname + '?p=' + encodeURIComponent(code);
    navigator.clipboard.writeText(url).then(function () {
      btn.textContent = 'URLをコピーしました';
      setTimeout(function () { btn.textContent = '共有'; }, 1800);
    }, function () {
      window.prompt('この共有URLをコピーしてください', url);
    });
  }

  function openSharedFromUrl() {
    const params = new URLSearchParams(location.search);
    const code = params.get('p');
    if (!code) return;
    const post = posts.find(function (p) {
      return String(p.shareId) === String(code) || String(p.id) === String(code);
    });
    if (post) { switchTab('browse'); openModal(post); }
  }

  async function downloadImage(p) {
    const id = driveFileId(p.imageUrl);
    const filename = p.title || ('image_' + p.id);
    const originalUrl = id ? ('https://lh3.googleusercontent.com/d/' + id + '=s0') : p.imageUrl;
    try {
      const res = await fetch(originalUrl);
      if (!res.ok) throw new Error('status ' + res.status);
      const blob = await res.blob();
      const ext = blob.type === 'image/jpeg' ? '.jpg' : (blob.type === 'image/webp' ? '.webp' : (blob.type === 'image/png' ? '.png' : ''));
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename + ext;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (err) {
      console.error(err);
      if (id) {
        const a = document.createElement('a');
        a.href = 'https://drive.google.com/uc?export=download&id=' + id;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
    }

    p.downloadCount = (Number(p.downloadCount) || 0) + 1;
    updateCountUI(p.id);
    try {
      const result = await postAction({ action: 'download', id: p.id });
      if (result && result.success && typeof result.downloadCount === 'number') {
        p.downloadCount = result.downloadCount;
        updateCountUI(p.id);
      }
    } catch (err) {
      console.error(err);
    }
  }

  function driveFileId(url) {
    if (!url) return '';
    let m = String(url).match(/[?&]id=([^&]+)/);
    if (m) return m[1];
    m = String(url).match(/\/d\/([^/=?&]+)/);
    if (m) return m[1];
    return '';
  }

  function imageTag(url, opts) {
    opts = opts || {};
    const id = driveFileId(url);
    const size = opts.size || 'w1000';
    const src = id ? ('https://drive.google.com/thumbnail?id=' + id + '&sz=' + size) : url;
    return '<img src="' + escapeHtml(src) + '"' +
      (opts.className ? ' class="' + opts.className + '"' : '') +
      (opts.lazy ? ' loading="lazy"' : '') +
      ' alt="' + escapeHtml(opts.alt || '') + '"' +
      ' data-fileid="' + escapeHtml(id) + '"' +
      ' data-size="' + escapeHtml(size) + '"' +
      ' data-retry="0">';
  }

  function handleImageError(e) {
    const img = e.target;
    if (!img || img.tagName !== 'IMG' || !img.dataset || img.dataset.fileid === undefined) return;
    const id = img.dataset.fileid;
    if (!id) return;
    const size = img.dataset.size || 'w1000';
    const retry = Number(img.dataset.retry || '0');
    if (retry < 2) {
      img.dataset.retry = String(retry + 1);
      setTimeout(function () {
        img.src = 'https://drive.google.com/thumbnail?id=' + id + '&sz=' + size + '&r=' + Date.now();
      }, 500 * (retry + 1));
    } else if (retry === 2) {
      img.dataset.retry = '3';
      img.src = 'https://lh3.googleusercontent.com/d/' + id + '=' + size;
    } else if (retry === 3) {
      img.dataset.retry = '4';
      img.classList.add('img-failed');
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  renderSortChips();
  loadPosts().then(openSharedFromUrl);
</script>
