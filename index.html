<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Reel — 画像&プロンプト共有</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14162B;
    --surface: #1D2044;
    --surface-2: #262A57;
    --ink: #F1EFEA;
    --ink-dim: #9497B8;
    --accent: #E8A33D;
    --accent-dim: #6B5730;
    --line: #363a6e;
    --danger: #E85A5A;
    --danger-dim: #5A2A2A;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 80px;
  }
  .wrap{ max-width: 980px; margin: 0 auto; }

  header{ margin-bottom: 24px; }
  header .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 34px;
    margin: 6px 0 4px;
    letter-spacing: -0.01em;
  }
  header p{ color: var(--ink-dim); margin: 0; font-size: 14px; }

  /* ---- タブ ---- */
  .tabs{
    display:flex; gap: 4px;
    margin: 26px 0 24px;
    border-bottom: 1px solid var(--line);
  }
  .tab-btn{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    background: none;
    color: var(--ink-dim);
    border: none;
    padding: 10px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn.active{ color: var(--ink); border-bottom-color: var(--accent); }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  /* ---- 投稿フォーム ---- */
  .panel{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .panel h2{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    margin: 0 0 16px;
    display:flex; align-items:center; gap:8px;
  }
  .panel h2::before{
    content:'';
    width:8px; height:8px;
    background: var(--accent);
    border-radius: 2px;
    display:inline-block;
  }

  label.field-label{
    display:block;
    font-size: 12px;
    color: var(--ink-dim);
    margin: 18px 0 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }
  label.field-label:first-of-type{ margin-top: 0; }

  /* ドロップゾーン */
  .dropzone{
    width:100%;
    background: var(--surface-2);
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    padding: 22px;
    color: var(--ink-dim);
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .dropzone.drag-over{ border-color: var(--accent); background: rgba(232,163,61,0.08); color: var(--accent); }
  .dropzone input{ display:none; }
  .dropzone .preview{
    margin-top: 14px; display:flex; justify-content:center;
  }
  .dropzone .preview img{
    max-height: 160px; border-radius: 8px; border: 1px solid var(--line);
  }

  input[type="text"], input[type="number"]{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px;
  }
  textarea{
    width:100%;
    min-height: 90px;
    resize: vertical;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  textarea:focus, input:focus, select:focus{
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* 設定グリッド */
  .settings-toggle{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: none; border: 1px solid var(--accent-dim);
    border-radius: 8px; padding: 8px 14px; margin-top: 18px; cursor: pointer;
  }
  .settings-grid{
    display:none;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-top: 14px;
    padding: 16px;
    background: var(--surface-2);
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .settings-grid.open{ display:grid; }
  .settings-grid .field label{
    display:block; font-size: 11px; color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace; margin-bottom: 5px;
  }
  .settings-grid .field input{ font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .tag-row{ display:flex; gap:8px; flex-wrap: wrap; }
  select{
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--ink);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }
  select{ flex: 1 1 160px; }
  .tag-row input[type="text"]{ flex: 1 1 160px; width:auto; }

  button{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    cursor: pointer;
    transition: transform .1s ease, opacity .15s ease;
  }
  button:active{ transform: scale(0.97); }
  .btn-ghost{
    background: var(--surface-2);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover{ border-color: var(--accent); color: var(--accent); }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 12px; min-height: 20px; }
  .chip{
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 999px;
    padding: 5px 10px 5px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    display:flex; align-items:center; gap:6px;
  }
  .chip button{
    background:none; border:none; color: var(--accent);
    padding:0; font-size:14px; line-height:1; cursor:pointer;
  }

  .submit-row{ margin-top: 22px; display:flex; align-items:center; gap:14px; }
  .btn-submit{
    background: var(--accent);
    color: #1a1300;
    font-weight: 600;
    padding: 11px 22px;
  }
  .btn-submit:hover{ opacity: 0.9; }
  .btn-submit:disabled{ opacity: 0.5; cursor: default; }
  .status{ font-size: 12px; color: var(--ink-dim); font-family: 'JetBrains Mono', monospace; }

  /* ---- 閲覧タブ:検索バー ---- */
  .search-panel{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 20px;
  }
  .search-row{ display:flex; align-items:center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-row:last-child{ margin-bottom: 0; }
  .search-row .label{
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim);
    min-width: 90px;
  }
  .mode-toggle{ display:flex; border: 1px solid var(--line); border-radius: 8px; overflow:hidden; }
  .mode-toggle button{
    background: var(--surface-2); color: var(--ink-dim); border-radius:0; padding: 6px 12px;
  }
  .mode-toggle button.active{ background: var(--accent); color: #1a1300; }

  .tag-cloud{ display:flex; flex-wrap: wrap; gap: 8px; }
  .tag-pill{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-dim);
    cursor: pointer;
    user-select: none;
  }
  .tag-pill.state-include{ background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .tag-pill.state-exclude{ background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }
  .clear-tags{ font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); background:none; border:none; text-decoration: underline; cursor: pointer; padding: 4px; }

  .toolbar{
    display:flex; justify-content: space-between; align-items:center;
    margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
  }
  .count{ color: var(--ink-dim); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  /* ---- 一覧(1投稿1行) ---- */
  .list{ display:flex; flex-direction: column; gap: 10px; }
  .row{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
  }
  .row-main{
    display:flex; align-items:center; gap: 16px;
    padding: 10px 16px;
  }
  .row-thumb{
    width: 96px; height: 96px; border-radius: 8px; overflow:hidden;
    flex-shrink: 0; background: var(--surface-2);
  }
  .row-thumb img{ width:100%; height:100%; object-fit: cover; display:block; }
  .row-info{ flex:1; min-width:0; }
  .row-title{
    font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
  }
  .row-meta{
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-dim); margin-top: 3px;
    display:flex; gap: 12px; flex-wrap: wrap;
  }
  .row-tags{ display:flex; gap:6px; flex-wrap:wrap; max-width: 220px; }
  .row-tags .tag{
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    background: var(--surface-2); color: var(--accent);
    padding: 2px 8px; border-radius: 999px; border: 1px solid var(--accent-dim);
  }
  .detail-grid{ display:flex; gap: 22px; flex-wrap: wrap; }
  .detail-image{ flex: 0 0 260px; }
  .detail-image img{ width:100%; border-radius: 10px; border: 1px solid var(--line); display:block; }
  .detail-text{ flex: 1 1 320px; min-width: 260px; }
  .detail-block{ margin-bottom: 16px; }
  .detail-block .label{
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim);
    margin-bottom: 5px; letter-spacing: 0.05em;
  }
  .detail-block .value{
    font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    background: var(--surface-2); border-radius: 8px; padding: 10px 12px; border: 1px solid var(--line);
  }
  .settings-table{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
    gap: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .settings-table div span{ color: var(--ink-dim); display:block; font-size:10.5px; }

  .empty{
    text-align:center; color: var(--ink-dim);
    padding: 60px 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }

  /* ---- 詳細モーダル ---- */
  .modal-overlay{
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,11,24,0.78);
    display:none; align-items: flex-start; justify-content: center;
    padding: 40px 16px; overflow-y: auto;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    max-width: 860px; width: 100%;
    padding: 22px 24px 26px;
    position: relative;
  }
  .modal-close{
    position: absolute; top: 14px; right: 14px;
    background: var(--surface-2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; padding: 6px 12px;
  }
  .modal-title{ font-family:'Space Grotesk',sans-serif; font-size: 20px; margin: 0 90px 6px 0; word-break: break-word; }
  .modal-meta{
    font-family:'JetBrains Mono',monospace; font-size: 12px; color: var(--ink-dim);
    display:flex; gap: 14px; flex-wrap:wrap; margin-bottom: 12px;
  }
  .modal .row-tags{ max-width: none; margin-bottom: 16px; }
  .modal-image{ text-align:center; }
  .modal-image img{ max-width: 100%; max-height: 70vh; border-radius: 10px; border: 1px solid var(--line); }
  .modal-actions{ display:flex; gap: 10px; justify-content:center; margin: 12px 0 20px; }
  .block-head{ display:flex; align-items:center; justify-content: space-between; gap: 10px; margin-bottom: 5px; }
  .block-head .label{ margin-bottom: 0; }
  .btn-copy{
    background: var(--surface-2); color: var(--accent);
    border: 1px solid var(--accent-dim); padding: 4px 12px; font-size: 11px;
  }
  .btn-copy:hover{ border-color: var(--accent); }

  /* ---- 読み込みオーバーレイ ---- */
  .loading-overlay{
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,11,24,0.65);
    display:none; align-items:center; justify-content:center; flex-direction: column; gap: 14px;
    font-family:'JetBrains Mono',monospace; font-size: 13px; color: var(--ink);
  }
  .loading-overlay.open{ display:flex; }
  .spinner{
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  textarea.autogrow{ resize: none; overflow: hidden; }
  .filter-input{ flex: 1 1 150px; width: auto; }

  /* ---- ソートチップ ---- */
  .sort-chips{ display:flex; flex-wrap:wrap; gap: 8px; }
  .sort-chip{
    font-family:'JetBrains Mono',monospace; font-size: 12px;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink-dim);
    cursor: pointer; user-select: none; display:inline-flex; align-items:center; gap: 6px;
  }
  .sort-chip.active{ background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .sort-chip .order-badge{
    font-size: 10px; background: var(--accent); color: #1a1300;
    border-radius: 999px; min-width: 15px; height: 15px; padding: 0 4px;
    display:inline-flex; align-items:center; justify-content:center;
  }

  /* ---- カウント表示 ---- */
  .count-badges{ display:flex; gap: 12px; align-items:center; }
  .count-badge{
    font-family:'JetBrains Mono',monospace; font-size: 12px; color: var(--ink-dim);
    display:inline-flex; align-items:center; gap: 4px;
  }
  .like-btn{
    background:none; border:none; padding: 0; cursor: pointer;
    font-family:'JetBrains Mono',monospace; font-size: 12px; color: var(--ink-dim);
    display:inline-flex; align-items:center; gap: 4px;
  }
  .like-btn .heart{ font-size: 14px; line-height: 1; }
  .like-btn.liked{ color: var(--danger); }
  .row-meta .count-badges{ margin-top: 2px; }
  .modal-counts{ margin-bottom: 12px; }
  .modal-counts .like-btn, .modal-counts .count-badge{ font-size: 14px; }
  .modal-counts .like-btn .heart{ font-size: 18px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">shared reel · friends only</div>
    <h1>Prompt Reel</h1>
    <p>画像とStable Diffusionの生成設定をセットで記録・共有するボードです。</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="post">投稿</button>
    <button class="tab-btn" data-tab="browse">投稿一覧</button>
  </nav>

  <!-- ============ 投稿タブ ============ -->
  <div class="tab-panel active" id="tab-post">
    <section class="panel">
      <h2>新規投稿</h2>

      <label class="field-label">画像</label>
      <div class="dropzone" id="dropzone">
        <span id="dropzoneLabel">ここに画像をドラッグ&ドロップ、またはクリックして選択</span>
        <div class="preview" id="previewWrap" style="display:none;"><img id="previewImg" alt="プレビュー"></div>
        <input type="file" id="imageInput" accept="image/*">
      </div>

      <label class="field-label">投稿タイトル</label>
      <input type="text" id="titleInput" placeholder="例: 桜並木の少女">

      <label class="field-label">投稿者(空欄で匿名)</label>
      <input type="text" id="authorInput" list="dl_author" placeholder="匿名">

      <label class="field-label">プロンプト</label>
      <textarea id="promptInput" class="autogrow" placeholder="Positive prompt"></textarea>

      <label class="field-label">ネガティブプロンプト</label>
      <textarea id="negativeInput" class="autogrow" placeholder="Negative prompt"></textarea>

      <label class="field-label">メモ(備考)</label>
      <textarea id="memoInput" class="autogrow" placeholder="補足・備考があれば"></textarea>

      <button class="settings-toggle" type="button" id="settingsToggleBtn">▸ 設定関係を入力(任意)</button>
      <div class="settings-grid" id="settingsGrid"></div>

      <label class="field-label">タグ(クリックで選択 / もう一度クリックで解除)</label>
      <div class="tag-cloud" id="postTagCloud"></div>
      <div class="tag-row" style="margin-top:10px;">
        <input type="text" id="newTagInput" placeholder="新しいタグを入力して追加">
        <button class="btn-ghost" id="addNewTagBtn" type="button">追加</button>
      </div>
      <div class="chips" id="selectedTags"></div>

      <div class="submit-row">
        <button class="btn-submit" id="submitBtn" type="button">投稿する</button>
        <span class="status" id="statusText"></span>
      </div>
    </section>
  </div>

  <!-- ============ 閲覧タブ ============ -->
  <div class="tab-panel" id="tab-browse">

    <div class="search-panel">
      <div class="search-row">
        <span class="label">並び順</span>
        <div class="sort-chips" id="sortChips"></div>
      </div>
      <div class="search-row">
        <span class="label" style="margin-left:0;">含むタグの条件</span>
        <div class="mode-toggle">
          <button type="button" data-mode="AND" class="active">AND</button>
          <button type="button" data-mode="OR">OR</button>
        </div>
        <button class="clear-tags" id="clearTagsBtn" type="button">タグ選択をクリア</button>
      </div>
      <div class="search-row">
        <span class="label">絞り込み</span>
        <input type="text" class="filter-input" id="filterAuthor" list="dl_author" placeholder="投稿者">
        <input type="text" class="filter-input" id="filterUiPreset" list="dl_set_uiPreset" placeholder="UI Preset">
        <input type="text" class="filter-input" id="filterCheckpoint" list="dl_set_checkpoint" placeholder="Checkpoint">
        <button class="clear-tags" id="clearFiltersBtn" type="button">絞り込みをクリア</button>
      </div>
      <div class="search-row">
        <span class="label">タグで絞込</span>
      </div>
      <div class="tag-cloud" id="tagCloud"></div>
      <div style="margin-top:8px; font-size:11px; color:var(--ink-dim); font-family:'JetBrains Mono',monospace;">
        クリックで切替: 未選択 → 含む(AND/OR) → 除外(NOT) → 未選択
      </div>
    </div>

    <div class="toolbar">
      <span class="count" id="postCount"></span>
    </div>

    <div class="list" id="list"></div>
    <div class="empty" id="emptyState" style="display:none;">条件に一致する投稿がありません。</div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingText">読み込み中...</span>
</div>

<datalist id="dl_author"></datalist>

<script>
  // ▼▼▼ ここをデプロイしたウェブアプリのURLに書き換えてください ▼▼▼
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxNsk0jrPHQLQE9akiT5OiM7iKG-VohCAUPErea_dd3JFLjBj4xBXi_lKkVRaEFyQQn/exec';
  // ▲▲▲ ───────────────────────────────────── ▲▲▲

  // Stable Diffusion 設定項目の定義 (フォーム生成・詳細表示の両方で使用)
  const SETTINGS_FIELDS = [
    { key: 'uiPreset',      label: 'UI Preset',          type: 'text' },
    { key: 'checkpoint',    label: 'Checkpoint',         type: 'text' },
    { key: 'vae',           label: 'VAE / Text Encoder', type: 'text' },
    { key: 'samplingMethod',label: 'Sampling Method',    type: 'text' },
    { key: 'scheduleType',  label: 'Schedule Type',      type: 'text' },
    { key: 'samplingSteps', label: 'Sampling Steps',     type: 'number' },
    { key: 'width',         label: 'Width',              type: 'number' },
    { key: 'height',        label: 'Height',             type: 'number' },
    { key: 'batchCount',    label: 'Batch Count',        type: 'number' },
    { key: 'batchSize',     label: 'Batch Size',         type: 'number' },
    { key: 'shift',         label: 'Shift',              type: 'number' },
    { key: 'cfgScale',      label: 'CFG Scale',          type: 'number' },
    { key: 'seed',          label: 'Seed',               type: 'text' }
  ];

  let posts = [];
  let selectedTags = []; // 投稿フォーム用
  let tagStates = {};    // 閲覧タブ用 { tagName: 'include' | 'exclude' }
  let matchMode = 'AND';

  const SORT_FIELDS = [
    { key: 'date',          label: '日時' },
    { key: 'likeCount',     label: 'いいね' },
    { key: 'downloadCount', label: 'ダウンロード' },
    { key: 'author',        label: '投稿者' },
    { key: 'uiPreset',      label: 'UI Preset' },
    { key: 'checkpoint',    label: 'Checkpoint' }
  ];

  // GAS WebアプリはクロスオリジンfetchだとCORSでブロックされることがあるため、
  // <script>タグ読み込み(JSONP)で取得する。
  function jsonpRequest(url) {
    return new Promise(function (resolve, reject) {
      const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      const script = document.createElement('script');

      const timeoutId = setTimeout(function () {
        cleanup();
        reject(new Error('タイムアウトしました'));
      }, 15000);

      function cleanup() {
        delete window[callbackName];
        script.remove();
        clearTimeout(timeoutId);
      }

      window[callbackName] = function (data) {
        cleanup();
        resolve(data);
      };

      script.onerror = function () {
        cleanup();
        reject(new Error('読み込みに失敗しました'));
      };

      script.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 'callback=' + callbackName;
      document.body.appendChild(script);
    });
  }

  async function loadPosts() {
    showLoading('読み込み中...');
    try {
      const data = await jsonpRequest(GAS_URL);
      posts = data.posts || [];
      rebuildTagUI();
      rebuildPostTagCloud();
      rebuildDatalists();
      renderList();
      statusText.textContent = '';
    } catch (err) {
      statusText.textContent = '読み込みに失敗しました';
      console.error(err);
    } finally {
      hideLoading();
    }
  }

  function sortJa(arr) {
    return arr.sort(function (a, b) { return String(a).localeCompare(String(b), 'ja', { numeric: true }); });
  }

  function uniqueFieldValues(getter) {
    const set = new Set();
    posts.forEach(function (p) {
      const v = getter(p);
      if (v !== undefined && v !== null && String(v).trim() !== '') set.add(String(v));
    });
    return sortJa(Array.from(set));
  }

  function fillDatalist(id, values) {
    const dl = document.getElementById(id);
    if (!dl) return;
    dl.innerHTML = values.map(function (v) { return '<option value="' + escapeHtml(v) + '"></option>'; }).join('');
  }

  function rebuildDatalists() {
    fillDatalist('dl_author', uniqueFieldValues(function (p) { return p.author; }));
    SETTINGS_FIELDS.forEach(function (f) {
      fillDatalist('dl_set_' + f.key, uniqueFieldValues(function (p) { return p.settings && p.settings[f.key]; }));
    });
  }

  function allUniqueTags() {
    const set = new Set();
    posts.forEach(function (p) { (p.tags || []).forEach(function (t) { set.add(t); }); });
    return sortJa(Array.from(set));
  }

  function rebuildTagUI() {
    const tags = allUniqueTags();

    // 閲覧タブのタグクラウド(既存の状態は保持しつつ、消えたタグは除外)
    Object.keys(tagStates).forEach(function (t) { if (!tags.includes(t)) delete tagStates[t]; });

    tagCloud.innerHTML = tags.map(function (t) {
      const state = tagStates[t] || 'none';
      const cls = state === 'include' ? 'state-include' : (state === 'exclude' ? 'state-exclude' : '');
      const mark = state === 'include' ? '+' : (state === 'exclude' ? '−' : '');
      return '<span class="tag-pill ' + cls + '" data-tag="' + escapeHtml(t) + '">' + (mark ? mark + ' ' : '') + escapeHtml(t) + '</span>';
    }).join('') || '<span style="color:var(--ink-dim); font-size:12px; font-family:\'JetBrains Mono\',monospace;">タグはまだありません</span>';

    tagCloud.querySelectorAll('.tag-pill').forEach(function (pill) {
      pill.addEventListener('click', function () {
        const t = pill.dataset.tag;
        const cur = tagStates[t] || 'none';
        const next = cur === 'none' ? 'include' : (cur === 'include' ? 'exclude' : 'none');
        if (next === 'none') delete tagStates[t]; else tagStates[t] = next;
        rebuildTagUI();
        renderList();
      });
    });
  }

  document.getElementById('clearTagsBtn').addEventListener('click', function () {
    tagStates = {};

    renderList();

  /* ---------- 複合ソートチップ ---------- */
  const sortChips = document.getElementById('sortChips');
  function renderSortChips() {
    sortChips.innerHTML = SORT_FIELDS.map(function (f) {
      const idx = sortKeys.findIndex(function (k) { return k.field === f.key; });
      const active = idx !== -1;
      const dir = active ? sortKeys[idx].dir : '';
      const arrow = dir === 'desc' ? '▼' : (dir === 'asc' ? '▲' : '');
      const badge = active ? '<span class="order-badge">' + (idx + 1) + '</span>' : '';
      return '<span class="sort-chip' + (active ? ' active' : '') + '" data-field="' + f.key + '">' +
        badge + f.label + (arrow ? ' ' + arrow : '') + '</span>';
    }).join('');

    sortChips.querySelectorAll('.sort-chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        const field = chip.dataset.field;
        const idx = sortKeys.findIndex(function (k) { return k.field === field; });
        if (idx === -1) {
          sortKeys.push({ field: field, dir: 'desc' });
        } else if (sortKeys[idx].dir === 'desc') {
          sortKeys[idx].dir = 'asc';
        } else {
          sortKeys.splice(idx, 1);
        }
        renderSortChips();
        renderList();
      });
    });
  }

  /* ---------- 投稿処理 ---------- */
  function fileToBase64(file) {
    return new Promise(function (resolve, reject) {
      const reader = new FileReader();
      reader.onload = function () { resolve(reader.result); };
      reader.onerror = reject;
      reader.readAsDataURL(file);

  document.getElementById('submitBtn').addEventListener('click', async function () {
    const submitBtn = this;
    const file = imageInput.files[0];

    if (!file) { statusText.textContent = '画像を選択してください'; return; }
    if (GAS_URL.indexOf('ここに') === 0) { statusText.textContent = 'GAS_URL が未設定です(index.html を確認)'; return; }

    submitBtn.disabled = true;
    showLoading('投稿中...');
    statusText.textContent = '';

    try {
      const base64 = await fileToBase64(file);
      const payload = {
        imageBase64: base64,
        imageMime: file.type,
        imageName: file.name,
        title: document.getElementById('titleInput').value,
        author: document.getElementById('authorInput').value,
        prompt: document.getElementById('promptInput').value,
        negativePrompt: document.getElementById('negativeInput').value,
        memo: document.getElementById('memoInput').value,

      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },

      await loadPosts();
      switchTab('browse');

  /* ---------- 閲覧タブ:一覧描画 ---------- */
  const list = document.getElementById('list');

  function passesTagFilter(post) {
    const tags = post.tags || [];
    const includeTags = Object.keys(tagStates).filter(function (t) { return tagStates[t] === 'include'; });
    const excludeTags = Object.keys(tagStates).filter(function (t) { return tagStates[t] === 'exclude'; });

    if (excludeTags.some(function (t) { return tags.includes(t); })) return false;

    if (includeTags.length) {
      const pass = matchMode === 'AND'
        ? includeTags.every(function (t) { return tags.includes(t); })
        : includeTags.some(function (t) { return tags.includes(t); });
      if (!pass) return false;
    }
    return true;
  }

  function formatDateTime(ts) {
    const dt = new Date(ts);
    return dt.getFullYear() + '/' + String(dt.getMonth() + 1).padStart(2, '0') + '/' +
      String(dt.getDate()).padStart(2, '0') + ' ' + String(dt.getHours()).padStart(2, '0') + ':' +
      String(dt.getMinutes()).padStart(2, '0');
  }

  function sortValueOf(p, field) {
    if (field === 'date') return new Date(p.timestamp).getTime();
    if (field === 'likeCount') return Number(p.likeCount) || 0;
    if (field === 'downloadCount') return Number(p.downloadCount) || 0;
    if (field === 'author') return p.author || '匿名';
    return (p.settings && p.settings[field]) || '';
  }

  function compareByKeys(a, b) {
    for (let i = 0; i < sortKeys.length; i++) {
      const key = sortKeys[i];
      const va = sortValueOf(a, key.field);
      const vb = sortValueOf(b, key.field);
      let cmp;
      if (typeof va === 'number' && typeof vb === 'number') {
        cmp = va - vb;
      } else {
        if (va === '' && vb !== '') { cmp = -1; }
        else if (vb === '' && va !== '') { cmp = 1; }
        else { cmp = String(va).localeCompare(String(vb), 'ja', { numeric: true }); }
      }
      if (cmp !== 0) return key.dir === 'desc' ? -cmp : cmp;
    }
    return new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime();
  }

  function countBadgesHtml(p) {
    const liked = !!likedPosts[p.id];
    return '<span class="count-badges">' +
      '<button class="like-btn' + (liked ? ' liked' : '') + '" type="button" data-like="' + p.id + '">' +
        '<span class="heart">' + (liked ? '♥' : '♡') + '</span>' +
        '<span data-like-count="' + p.id + '">' + (Number(p.likeCount) || 0) + '</span>' +
      '</button>' +
      '<span class="count-badge">⬇ <span data-dl-count="' + p.id + '">' + (Number(p.downloadCount) || 0) + '</span></span>' +
    '</span>';
  }

  function renderList() {
    let filtered = posts.filter(passesTagFilter);

    const fAuthor = document.getElementById('filterAuthor').value.trim().toLowerCase();
    const fUiPreset = document.getElementById('filterUiPreset').value.trim().toLowerCase();
    const fCheckpoint = document.getElementById('filterCheckpoint').value.trim().toLowerCase();
    filtered = filtered.filter(function (p) {
      const author = String(p.author || '').toLowerCase();
      const uiPreset = String((p.settings && p.settings.uiPreset) || '').toLowerCase();
      const checkpoint = String((p.settings && p.settings.checkpoint) || '').toLowerCase();
      if (fAuthor && author.indexOf(fAuthor) === -1) return false;
      if (fUiPreset && uiPreset.indexOf(fUiPreset) === -1) return false;
      if (fCheckpoint && checkpoint.indexOf(fCheckpoint) === -1) return false;
      return true;
    });

    filtered.sort(compareByKeys);

    postCount.textContent = filtered.length + ' 件';
    emptyState.style.display = filtered.length ? 'none' : 'block';

    list.innerHTML = filtered.map(function (p) {
      const title = p.title ? escapeHtml(p.title) : '(無題)';
      const author = p.author ? escapeHtml(p.author) : '匿名';

      return '' +
        '<div class="row" data-id="' + p.id + '">' +
          '<div class="row-main">' +
            '<div class="row-thumb"><img src="' + escapeHtml(p.imageUrl) + '" loading="lazy" alt="サムネイル"></div>' +
            '<div class="row-info">' +
              '<div class="row-title">' + title + '</div>' +
              '<div class="row-meta"><span>' + formatDateTime(p.timestamp) + '</span><span>投稿者: ' + author + '</span></div>' +
              countBadgesHtml(p) +
            '</div>' +
            '<div class="row-tags">' + (p.tags || []).map(function (t) { return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join('') + '</div>' +
          '</div>' +
        '</div>';
    }).join('');

    list.querySelectorAll('.like-btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        toggleLike(btn.dataset.like);
      });

    list.querySelectorAll('.row').forEach(function (row) {
      row.addEventListener('click', function () {
        const post = posts.find(function (p) { return String(p.id) === String(row.dataset.id); });
        if (post) openModal(post);

    modalBody.querySelectorAll('.btn-copy').forEach(function (btn) {

    document.getElementById('downloadBtn').addEventListener('click', function () { downloadImage(p); });
    document.getElementById('shareBtn').addEventListener('click', function () { sharePost(p, this); });
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

  function updateCountUI(id) {
    const p = posts.find(function (x) { return String(x.id) === String(id); });
    if (!p) return;
    const liked = !!likedPosts[id];
    document.querySelectorAll('[data-like-count="' + id + '"]').forEach(function (el) {

    document.querySelectorAll('[data-dl-count="' + id + '"]').forEach(function (el) {

  async function toggleLike(id) {
    const p = posts.find(function (x) { return String(x.id) === String(id); });
    if (!p) return;
    const currentlyLiked = !!likedPosts[id];
    const delta = currentlyLiked ? -1 : 1;

    if (currentlyLiked) delete likedPosts[id]; else likedPosts[id] = true;
    saveLiked();
    p.likeCount = Math.max(0, (Number(p.likeCount) || 0) + delta);
    updateCountUI(id);

    try {
      const result = await postAction({ action: 'like', id: id, delta: delta });
      if (result && result.success && typeof result.likeCount === 'number') {
        p.likeCount = result.likeCount;
        updateCountUI(id);
      }
    } catch (err) {
      console.error(err);
    }
  }

  function sharePost(p, btn) {
    const code = p.shareId || p.id;
    const url = location.origin + location.pathname + '?p=' + encodeURIComponent(code);
    navigator.clipboard.writeText(url).then(function () {
      btn.textContent = 'URLをコピーしました';
      setTimeout(function () { btn.textContent = '共有'; }, 1800);
    }, function () {
      window.prompt('この共有URLをコピーしてください', url);
    });
  }

  function openSharedFromUrl() {
    const params = new URLSearchParams(location.search);
    const code = params.get('p');
    if (!code) return;
    const post = posts.find(function (p) {
      return String(p.shareId) === String(code) || String(p.id) === String(code);
    });
    if (post) { switchTab('browse'); openModal(post); }
  }

  async function downloadImage(p) {
    const filename = p.title || ('image_' + p.id);
    try {
      const res = await fetch(p.imageUrl);
      const blob = await res.blob();
      const ext = blob.type === 'image/jpeg' ? '.jpg' : (blob.type === 'image/webp' ? '.webp' : '.png');
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename + ext;
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      window.open(p.imageUrl, '_blank');
    }

    p.downloadCount = (Number(p.downloadCount) || 0) + 1;
    updateCountUI(p.id);
    try {
      const result = await postAction({ action: 'download', id: p.id });
      if (result && result.success && typeof result.downloadCount === 'number') {
        p.downloadCount = result.downloadCount;
        updateCountUI(p.id);
      }
    } catch (err) {
      console.error(err);
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  renderSortChips();
  loadPosts().then(openSharedFromUrl);
</script>
</body>
</html>
